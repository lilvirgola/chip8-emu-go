<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CHIP-8 Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body class="w-full h-full bg-neutral-900">
    <div id="loading" class="fixed inset-0 z-10 flex items-center justify-center bg-neutral-900 text-neutral-200 font-mono text-lg">
        Loading emulator...
    </div>

    <div id="error" class="fixed top-0 left-0 w-full z-20 hidden box-border px-4 py-3 bg-red-700 text-white font-mono text-sm"></div>

    <canvas id="canvas" class="block w-full h-full"></canvas>

    <script src="wasm_exec.js"></script>
    <script>
        window.addEventListener("dragover", (e) => e.preventDefault());
        window.addEventListener("drop", (e) => e.preventDefault());

        function showError(msg) {
            const el = document.getElementById("error");
            el.textContent = "Error: " + msg;
            el.classList.remove("hidden");
            document.getElementById("loading").classList.add("hidden");
        }

        if (!window.WebAssembly) {
            showError("your browser does not support WebAssembly.");
        } else {
            const go = new Go();

            WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject)
                .then((result) => {
                    document.getElementById("loading").classList.add("hidden");
                    go.run(result.instance);
                })
                .catch((err) => {
                    console.error(err);
                    showError(err.message || String(err));
                });
        }
    </script>
</body>
</html>
